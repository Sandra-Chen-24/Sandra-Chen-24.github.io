baseURL = "https://sandra-chen-24.github.io/"
title = "Sandra Chen Blog"
theme = "hugo-theme-stack"
# 預設語系
defaultContentLanguage = "zh-tw"

[languages]
  [languages.zh-tw]
    languageCode = "zh-tw"
    locale = "zh-tw"
    languageName = "繁體中文"
    weight = 1

  # 💡 必須補上這一塊！因為你有 content/_index.zh-cn.md 檔案
  [languages.zh-cn]
    languageCode = "zh-cn"
    locale = "zh-cn"
    languageName = "简体中文"
    weight = 2

[pagination]
  pagerSize = 5

[params]
  mainSections = ["posts"]
  description = "Sandra Chen's personal blog powered by Hugo Stack"
  favicon = "favicon.ico"

  [params.sidebar]
    emoji = "📝"
    subtitle = "Notes & Writings"

  [params.footer]
    since = 2025

[menu]
  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 1

  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 2

[markup]
  [markup.goldmark.renderer]
    unsafe = true
